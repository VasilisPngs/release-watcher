name: Build Public APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.5.1

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Prepare APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/release-watcher-debug.apk

      - name: Create public GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: debug-${{ github.run_number }}
        run: |
          gh release create "$TAG" dist/release-watcher-debug.apk \
            --target "$GITHUB_SHA" \
            --title "Release Watcher Debug ${{ github.run_number }}" \
            --notes "Debug APK for manual Android sideload."
